  #       condition: service_healthy
  #   command:
  #     - node
  #     - node_modules/prisma/build/index.js
  #     - studio
  #     - --browser
  #     - none

  # # ── Next.js dev server (hot-reload) ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carkhodro_app
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      DATABASE_URL: >-
        postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-carkhodro}?schema=public
      NEXT_TELEMETRY_DISABLED: "1"

    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
