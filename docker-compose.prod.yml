services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: carkhodro_db_prod
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB:       ${POSTGRES_DB:-carkhodro}
    expose:
      - "5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-carkhodro}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  # ── Prisma migrations (one-shot before app starts) ────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: carkhodro_migrate_prod
    restart: "no"
    environment:
      DATABASE_URL: &db_url >-
        postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-carkhodro}?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: carkhodro_seed
    restart: "no"
    environment:
      DATABASE_URL: >-
        postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-carkhodro}?schema=public
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["node_modules/.bin/tsx", "prisma/seed.ts"]
  # ── Next.js production server ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: carkhodro:${IMAGE_TAG:-latest}
    container_name: carkhodro_app_prod
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: *db_url
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      # Add your app secrets here (or pass via .env / secret manager):
      # NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      # NEXTAUTH_URL:    ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # Override the Dockerfile CMD — migrate service already handled DB setup.
    command: ["node", "server.js"]
    networks:
      - backend
      - frontend

networks:
  # DB and app talk on this network; not exposed to internet
  backend:
    driver: bridge
    internal: true
  # App is reachable from outside (port binding above)
  frontend:
    driver: bridge

volumes:
  postgres_prod_data:
